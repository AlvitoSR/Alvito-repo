name: Build e publicar plugin

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar código do repositório
        uses: actions/checkout@v4
        with:
          path: meu-plugin

      - name: Clonar template do Codeberg
        run: |
          git clone --depth 1 https://codeberg.org/cloudstream/cloudstream-extensions.git template

      - name: Copiar plugin para dentro do template
        run: |
          cp -r meu-plugin/EmbedTvProvider template/EmbedTvProvider

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Configurar Android SDK
        uses: android-actions/setup-android@v3

      - name: Compilar plugin
        working-directory: template
        run: |
          chmod +x gradlew
          ./gradlew EmbedTvProvider:make

      - name: Gerar plugins.json
        run: |
          REPO="${{ github.repository }}"
          USER="${{ github.repository_owner }}"
          cat > plugins.json << JSONEOF
          [
            {
              "name": "EmbedTV",
              "internalName": "EmbedTvProvider",
              "url": "https://github.com/${REPO}/releases/latest/download/EmbedTvProvider.cs3",
              "authors": ["${USER}"],
              "status": 1,
              "tvTypes": ["Live"],
              "description": "Canais de TV ao vivo — EmbedTV",
              "language": "pt",
              "iconUrl": "https://w1.embedtv.live/favicon.ico",
              "version": 1
            }
          ]
          JSONEOF

      - name: Publicar Release
        uses: ncipollo/release-action@v1
        with:
          artifacts: "template/EmbedTvProvider/build/EmbedTvProvider.cs3,plugins.json"
          tag: "v${{ github.run_number }}"
          name: "Build ${{ github.run_number }}"
          body: "Plugin EmbedTV compilado automaticamente."
          token: ${{ secrets.GITHUB_TOKEN }}
          allowUpdates: true

      - name: Publicar plugins.json no GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          include_files: plugins.json
